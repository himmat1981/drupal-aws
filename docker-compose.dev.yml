services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: drupal-php
    volumes:
      - .:/var/www/html
    environment:
      DB_HOST: db
      DB_NAME: drupal
      DB_USER: drupal
      DB_PASS: drupal
    depends_on:
      db:
        condition: service_healthy
    networks:
      - drupalnet

  nginx:
    image: nginx:1.25-alpine
    container_name: drupal-nginx
    ports:
      - "80:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - drupalnet

  db:
    image: mariadb:10.6
    container_name: drupal-db
    environment:
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - drupalnet
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  vector-db:
    image: pgvector/pgvector:pg16
    container_name: pgvector-db
    environment:
      POSTGRES_DB: vectors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - vector_data:/var/lib/postgresql/data
    networks:
      - drupalnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  python-api:
    build: ./python
    container_name: vector-api
    ports:
      - "8000:8000"
    env_file:
      - ./python/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgvector-db:5432/vectors
      LLM_MODEL: llama-3.3-70b-versatile
    volumes:
      - ./python:/app    # ← mount entire python folder not just single file
    depends_on:
      vector-db:
        condition: service_healthy
    networks:
      - drupalnet

networks:
  drupalnet:

volumes:
  db_data:
  vector_data: