name: Deploy Drupal + Python API to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Configure AWS
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      # 3. Login to ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

      # 4. Build Drupal image
      - name: Build Drupal image
        run: |
          docker build -t drupal-app:latest -f docker/php/Dockerfile .

      # 5. Build Python API image
      - name: Build Python API image
        run: |
          docker build -t vector-api:latest -f python/Dockerfile ./python

      # 6. Tag images
      - name: Tag images
        run: |
          docker tag drupal-app:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/drupal-app:latest

          docker tag vector-api:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/vector-api:latest

      # 7. Push images
      - name: Push images
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/drupal-app:latest
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/vector-api:latest

      # 8. Copy files to EC2
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          source:   "docker-compose.yml,docker/nginx/default.conf"
          target:   "/home/ec2-user/app"

      # 9. Deploy
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ec2-user
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | \
            docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

            cd /home/ec2-user/app
            echo "AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}" > .env
            # Create env file
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > python.env
            echo "DATABASE_URL=postgresql://postgres:postgres@vector-db:5432/vectors" >> python.env
            echo "LLM_MODEL=llama-3.3-70b-versatile" >> python.env

            # Pull latest images
            docker compose pull

            # Restart containers
            docker compose down || true
            docker compose up -d

            # Cleanup
            docker image prune -f