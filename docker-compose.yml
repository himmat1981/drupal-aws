version: "3.9"

services:

  php:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-south-1.amazonaws.com/drupal-app:latest
    container_name: drupal-php
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: drupal
      DB_USER: drupal
      DB_PASS: drupal
    depends_on:
      - db
    networks:
      - drupalnet

  nginx:
    image: nginx:1.25-alpine
    container_name: drupal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - drupalnet

  db:
    image: mariadb:10.6
    container_name: drupal-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: drupal
      MYSQL_USER: drupal
      MYSQL_PASSWORD: drupal
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - drupalnet

  vector-db:
    image: pgvector/pgvector:pg16
    container_name: pgvector-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vectors
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - vector_data:/var/lib/postgresql/data
    networks:
      - drupalnet

  python-api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.ap-south-1.amazonaws.com/vector-api:latest
    container_name: vector-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - python.env
    depends_on:
      - vector-db
    networks:
      - drupalnet

networks:
  drupalnet:

volumes:
  db_data:
  vector_data: